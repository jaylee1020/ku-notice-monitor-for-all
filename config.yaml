# 건국대학교 공지 모니터링 에이전트 설정

# === 사용자 프로필 ===
# 개인정보는 GitHub Secrets에 저장하고 환경변수로 주입합니다.
# 환경변수 PROFILE_JSON 예시:
#   {"major":"컴퓨터공학부","previous_major":"KU자유전공학부","year":2,"campus":"서울","status":"재학"}
# 환경변수 KEYWORDS_JSON 예시:
#   {"high":["장학","등록금","수강신청"],"medium":["취업","인턴","공모전"]}
#
# 아래는 환경변수가 없을 때 사용되는 기본값입니다.
profile:
  major: ""
  previous_major: ""
  year: 0
  campus: ""
  status: ""

keywords:
  high: []
  medium: []

# === RSS 피드 설정 ===
feeds:
  학사공지:
    id: 234
    enabled: true
  장학공지:
    id: 235
    enabled: true
  취창업공지:
    id: 236
    enabled: true
  국제교류:
    id: 237
    enabled: true
  학생생활:
    id: 238
    enabled: true
  입찰공고공지:
    id: 239
    enabled: false
  일반공지:
    id: 240
    enabled: true

# === Gemini 설정 ===
gemini:
  model: "gemini-flash-latest"
  relevance_threshold: 3      # 1-5 점수 중 이 점수 이상이면 관련 공지로 분류

# === 설정 ===
settings:
  state_file: "state.json"
  base_url: "https://www.konkuk.ac.kr"
  rss_url_template: "https://www.konkuk.ac.kr/bbs/konkuk/{board_id}/rssList.do"
  # 건국대 서버 SSL 인증서 문제로 인해 기본값은 false입니다.
  # 인증서 문제가 해결된 경우 true로 변경하면 보안이 강화됩니다.
  # ssl_verify가 false인 경우, 매 실행 시 SSL 상태를 자동 점검하고 로그에 기록합니다.
  ssl_verify: false
