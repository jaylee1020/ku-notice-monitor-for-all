name: 텔레그램 명령 처리

# GitHub 계정 없는 사용자도 텔레그램만으로 봇을 이용할 수 있도록
# 명령어를 15분마다 처리한다. (기존 하루 1회 → 최대 15분 대기)

on:
  schedule:
    - cron: '*/15 * * * *'  # 15분마다
  workflow_dispatch:

concurrency:
  group: ku-notice-monitor   # monitor.yml 과 동일 그룹 → 동시 실행 방지
  cancel-in-progress: false

jobs:
  handle-commands:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pull latest state
        run: git pull origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --commands-only

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add users.json
          git diff --staged --quiet || git commit -m "Process commands [skip ci]"
          git push
