name: 텔레그램 검색 응답

on:
  schedule:
    # 5분 간격 실행 (public repo → Actions 무제한)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run search handler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROFILE_JSON: ${{ secrets.PROFILE_JSON }}
          KEYWORDS_JSON: ${{ secrets.KEYWORDS_JSON }}
        run: python search_handler.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search_state.json
          git diff --staged --quiet || git commit -m "Update search_state.json [skip ci]"
          git push
