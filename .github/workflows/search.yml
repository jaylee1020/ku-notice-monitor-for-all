name: 텔레그램 검색 응답

on:
  workflow_dispatch: # 수동 실행만 가능 (스케줄 비활성화)

concurrency:
  group: search-handler
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run search handler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROFILE_JSON: ${{ secrets.PROFILE_JSON }}
          KEYWORDS_JSON: ${{ secrets.KEYWORDS_JSON }}
        run: python search_handler.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f search_state.json ]; then
            git add search_state.json
          fi
          git diff --staged --quiet || git commit -m "Update search_state.json [skip ci]"
          git push
