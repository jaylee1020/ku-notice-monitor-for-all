name: 건국대 공지 모니터링

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 오전 10시 KST (UTC+9 → UTC 01:00)
  workflow_dispatch:

concurrency:
  group: ku-notice-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        id: monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROFILE_JSON: ${{ secrets.PROFILE_JSON }}
          KEYWORDS_JSON: ${{ secrets.KEYWORDS_JSON }}
        run: python main.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json users.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import asyncio, os
          from notifier import notify_error
          run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          chat_id = os.environ.get('ADMIN_CHAT_ID', '') or os.environ.get('TELEGRAM_CHAT_ID', '')
          asyncio.run(notify_error(f'GitHub Actions 워크플로우 실패\n로그 확인: {run_url}', chat_id=chat_id))
          "
